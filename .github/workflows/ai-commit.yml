name: AI Commit

on:
  workflow_dispatch: # Allows manual triggering
  push:
    branches: [ main ] # Or your default branch

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for git history

      - name: Configure Git
        run: |
          git config --global user.name "AI Assistant"
          git config --global user.email "ai@example.com"

      - name: Make changes (example)
        run: |
          echo "Hello from AI" >> README.md
          git add README.md
          git commit -m "AI: Update README.md"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.AI_COMMIT_TOKEN }}
